<!DOCTYPE html>
<html>
<head>
  <meta charset='utf-8'>
  <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'/>
  <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#111;font-family:Arial,sans-serif;color:#eee;overflow:hidden}
    #map{width:100%;height:585px}
    #panel{background:rgba(10,10,25,.97);padding:8px 12px;
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;
      border-top:2px solid #1e3a5f;min-height:58px}
    .ctrl{display:flex;align-items:center;gap:5px;font-size:12px}
    .ctrl label{color:#aaa;white-space:nowrap}
    /* ── Inputs numéricos ── */
    .ninp{
      background:#0d1b2a;color:#FFD700;border:1px solid #2196F3;
      padding:3px 5px;border-radius:4px;font-size:13px;font-weight:bold;
      text-align:center;outline:none;transition:border-color .15s;
    }
    .ninp:focus{border-color:#64B5F6;box-shadow:0 0 0 2px rgba(33,150,243,.25)}
    .ninp::-webkit-outer-spin-button,.ninp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
    .ninp[type=number]{-moz-appearance:textfield}
    /* ── Botões de passo ── */
    .sbtn{
      background:#0d1b2a;color:#90CAF9;border:1px solid #2c4a6e;
      padding:2px 8px;border-radius:4px;cursor:pointer;
      font-size:14px;font-weight:bold;line-height:1.4;
      transition:background .12s,color .12s;
      user-select:none;-webkit-user-select:none;
    }
    .sbtn:hover{background:#1565C0;color:#fff;border-color:#2196F3}
    .sbtn:active{background:#0D47A1}
    .unit{color:#607d8b;font-size:11px;font-weight:normal}
    /* ── Botões principais ── */
    .btn{background:#2196F3;color:#fff;border:none;padding:5px 13px;
      border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;white-space:nowrap}
    .btn:hover{background:#1565C0}
    .btn.on{background:#4CAF50}.btn.on:hover{background:#2E7D32}
    #btnApply{background:#4CAF50;font-size:13px;padding:7px 22px;margin-left:auto;
      border-radius:5px;letter-spacing:.3px}
    #btnApply:hover{background:#2E7D32}
    #btnApply.done{background:#1565C0;cursor:default}
    #status{color:#90CAF9;font-size:11px;max-width:240px;text-align:right}
    .leaflet-overlay-pane{pointer-events:none!important}
    .leaflet-overlay-pane *{pointer-events:none!important}
    /* separador vertical entre grupos */
    .sep{width:1px;background:#1e3a5f;height:28px;margin:0 2px}
  </style>
</head>
<body>
  <div id='map'></div>
  <div id='panel'>

    <button class='btn' id='btnC' onclick='toggleCampo()'>⚽ Mostrar Campo</button>
    <div class='sep'></div>

    <!-- Lat / Lon -->
    <div class='ctrl'>
      <label>📍 Lat:</label>
      <input type='number' class='ninp' id='inLat' value='0' step='0.00005'
        style='width:108px' oninput='onCenter()'>
    </div>
    <div class='ctrl'>
      <label>Lon:</label>
      <input type='number' class='ninp' id='inLon' value='0' step='0.00005'
        style='width:108px' oninput='onCenter()'>
    </div>
    <div class='sep'></div>

    <!-- Rotação com passo fino e grosso -->
    <div class='ctrl'>
      <label>🧭 Rot:</label>
      <button class='sbtn' onclick='stepRot(-10)' title='−10°'>«</button>
      <button class='sbtn' onclick='stepRot(-1)'  title='−1°'>‹</button>
      <input type='number' class='ninp' id='rot' min='0' max='359' value='0'
        style='width:50px' oninput='onRot()'>
      <span class='unit'>°</span>
      <button class='sbtn' onclick='stepRot(1)'   title='+1°'>›</button>
      <button class='sbtn' onclick='stepRot(10)'  title='+10°'>»</button>
    </div>
    <div class='sep'></div>

    <!-- Comprimento -->
    <div class='ctrl'>
      <label>📏 Compr:</label>
      <button class='sbtn' onclick='stepDim("fl",-1)' title='−1m'>−</button>
      <input type='number' class='ninp' id='fl' min='90' max='120' value='105'
        style='width:46px' oninput='onDim()'>
      <span class='unit'>m</span>
      <button class='sbtn' onclick='stepDim("fl",1)' title='+1m'>+</button>
    </div>

    <!-- Largura -->
    <div class='ctrl'>
      <label>📏 Larg:</label>
      <button class='sbtn' onclick='stepDim("fw",-1)' title='−1m'>−</button>
      <input type='number' class='ninp' id='fw' min='55' max='90' value='68'
        style='width:46px' oninput='onDim()'>
      <span class='unit'>m</span>
      <button class='sbtn' onclick='stepDim("fw",1)' title='+1m'>+</button>
    </div>

    <!-- Margem -->
    <div class='ctrl'>
      <label>📐 Marg:</label>
      <button class='sbtn' onclick='stepDim("ig",-1)' title='−1m'>−</button>
      <input type='number' class='ninp' id='ig' min='0' max='15' value='1'
        style='width:40px' oninput='onDim()'>
      <span class='unit'>m</span>
      <button class='sbtn' onclick='stepDim("ig",1)' title='+1m'>+</button>
    </div>
    <div class='sep'></div>

    <button id='btnApply' onclick='aplicar()'>✅ Aplicar Campo</button>
    <span id='status'>📍 Arraste ⊙ ou edite Lat/Lon · botões «‹›» ajustam rotação</span>
  </div>

  <script>
  // ── Estado global ──────────────────────────────────────────────────
  var cLat=0, cLon=0, rotD=0, fL=105, fW=68, fI=1;
  var campoOn=false;
  var map=null, cm=null, cl=null;
  var initialized=false;
  var baseLayers=[];

  // ── Protocolo Streamlit ─────────────────────────────────────────────
  window.parent.postMessage({
    isStreamlitMessage:true, type:'streamlit:componentReady', apiVersion:1
  }, '*');

  window.addEventListener('message', function(e){
    if(!e.data || typeof e.data !== 'object') return;
    if(e.data.type === 'streamlit:render' && !initialized){
      var a = e.data.args || {};
      initMap(a.pts||[], a.lat_c||0, a.lon_c||0, a.rot||0, a.fl||105, a.fw||68);
      initialized = true;
    }
  });

  function aplicar(){
    window.parent.postMessage({
      isStreamlitMessage:true,
      type:'streamlit:setComponentValue',
      value:{lat:cLat, lon:cLon, rot:rotD, fl:fL, fw:fW, ig:fI},
      dataType:'json'
    }, '*');
    var b = document.getElementById('btnApply');
    b.textContent = '✅ Campo Aplicado!';
    b.classList.add('done');
    b.onclick = null;
    document.getElementById('status').textContent =
      '🔒 '+cLat.toFixed(5)+', '+cLon.toFixed(5)+' · rot '+rotD+'° · '+fL+'×'+fW+'m';
  }

  // ── Inicialização do mapa ────────────────────────────────────────────
  function initMap(pts, lat_c, lon_c, rot, fl, fw){
    cLat = lat_c; cLon = lon_c;
    // Pré-popula com dados do venue (se fornecidos pelo Python)
    rotD = +rot || 0;
    fL   = +fl  || 105;
    fW   = +fw  || 68;
    document.getElementById('inLat').value = cLat.toFixed(6);
    document.getElementById('inLon').value = cLon.toFixed(6);
    document.getElementById('rot').value   = rotD;
    document.getElementById('fl').value    = fL;
    document.getElementById('fw').value    = fW;

    map = L.map('map', {maxZoom: 21}).setView([cLat, cLon], 18);

    L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
      subdomains: ['mt0','mt1','mt2','mt3'],
      attribution: '© Google Satellite',
      maxZoom: 21, maxNativeZoom: 21
    }).addTo(map);

    // Trajetória GPS colorida
    function vc(v){
      if(v<7)  return '#2196F3';
      if(v<14) return '#4CAF50';
      if(v<19) return '#FFEB3B';
      if(v<24) return '#FF9800';
      return '#F44336';
    }
    var seg=[], sc=null;
    for(var i=0; i<pts.length; i++){
      var c=vc(pts[i].v);
      if(c===sc){ seg.push([pts[i].lat,pts[i].lon]); }
      else{
        if(seg.length>1) L.polyline(seg,{color:sc,weight:3,opacity:.85,interactive:false}).addTo(map);
        seg = i>0 ? [[pts[i-1].lat,pts[i-1].lon],[pts[i].lat,pts[i].lon]] : [[pts[i].lat,pts[i].lon]];
        sc=c;
      }
    }
    if(seg.length>1) L.polyline(seg,{color:sc,weight:3,opacity:.85,interactive:false}).addTo(map);
    if(pts.length>0){
      L.circleMarker([pts[0].lat,pts[0].lon],
        {radius:7,color:'white',fillColor:'#00E676',fillOpacity:1,weight:2,interactive:false}).addTo(map);
      L.circleMarker([pts[pts.length-1].lat,pts[pts.length-1].lon],
        {radius:7,color:'white',fillColor:'#F44336',fillOpacity:1,weight:2,interactive:false}).addTo(map);
    }

    // Marcador arrastável (centro do campo)
    var cmIcon = L.divIcon({
      className:'',
      html:'<div style="width:24px;height:24px;background:#FFEB3B;border:3px solid white;'+
           'border-radius:50%;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.7);'+
           'margin:-12px 0 0 -12px;"></div>',
      iconSize:[24,24], iconAnchor:[12,12]
    });
    cm = L.marker([cLat,cLon],{draggable:true,icon:cmIcon,zIndexOffset:1000}).addTo(map);

    cm.on('drag', function(e){
      var ll=e.target.getLatLng();
      cLat=ll.lat; cLon=ll.lng;
      syncInputs();
      if(campoOn) drawField();
      document.getElementById('status').textContent='⟳ '+cLat.toFixed(5)+', '+cLon.toFixed(5);
    });
    cm.on('dragend', function(e){
      var ll=e.target.getLatLng();
      cLat=ll.lat; cLon=ll.lng;
      syncInputs();
      drawField();
      document.getElementById('status').textContent='🎯 '+cLat.toFixed(5)+', '+cLon.toFixed(5);
    });

    cl = L.layerGroup().addTo(map);

    // Legenda de velocidade
    var leg = L.control({position:'bottomleft'});
    leg.onAdd = function(){
      var d = L.DomUtil.create('div');
      d.style='background:rgba(0,0,0,.78);padding:8px 11px;border-radius:6px;'+
              'color:#fff;font-size:11px;line-height:1.9';
      d.innerHTML='<b>Velocidade</b><br>'
        +'<span style="color:#2196F3">■</span> &lt;7 km/h Caminhada<br>'
        +'<span style="color:#4CAF50">■</span> 7-14 km/h Trote<br>'
        +'<span style="color:#FFEB3B">■</span> 14-19 km/h Corrida<br>'
        +'<span style="color:#FF9800">■</span> 19-24 km/h Intensa<br>'
        +'<span style="color:#F44336">■</span> &gt;24 km/h Sprint';
      L.DomEvent.disableClickPropagation(d);
      return d;
    };
    leg.addTo(map);

    window.parent.postMessage({
      isStreamlitMessage:true, type:'streamlit:setFrameHeight', height:700
    }, '*');
  }

  // ── Controles do painel ──────────────────────────────────────────────
  function syncInputs(){
    document.getElementById('inLat').value = cLat.toFixed(6);
    document.getElementById('inLon').value = cLon.toFixed(6);
  }

  function onCenter(){
    var v1=parseFloat(document.getElementById('inLat').value);
    var v2=parseFloat(document.getElementById('inLon').value);
    if(isNaN(v1)||isNaN(v2)) return;
    cLat=v1; cLon=v2;
    if(cm) cm.setLatLng([cLat,cLon]);
    if(map) map.panTo([cLat,cLon]);
    drawField();
    document.getElementById('status').textContent='🎯 '+cLat.toFixed(5)+', '+cLon.toFixed(5);
  }

  /* Rotação — lê diretamente do input, garante 0-359 */
  function onRot(){
    var v=+document.getElementById('rot').value;
    v=((v%360)+360)%360;
    document.getElementById('rot').value=v;
    rotD=v;
    drawField();
  }
  function stepRot(d){
    var el=document.getElementById('rot');
    var v=((+el.value+d)%360+360)%360;
    el.value=v;
    rotD=v;
    drawField();
    document.getElementById('status').textContent='🧭 Rotação: '+rotD+'°';
  }

  /* Dimensões */
  function onDim(){
    fL=+document.getElementById('fl').value;
    fW=+document.getElementById('fw').value;
    fI=+document.getElementById('ig').value;
    drawField();
  }
  function stepDim(id,d){
    var el=document.getElementById(id);
    var mn=parseFloat(el.min)||0;
    var mx=parseFloat(el.max)||999;
    el.value=Math.max(mn,Math.min(mx,+el.value+d));
    onDim();
  }

  function toggleCampo(){
    campoOn=!campoOn;
    var b=document.getElementById('btnC');
    b.textContent=campoOn?'⚽ Ocultar Campo':'⚽ Mostrar Campo';
    b.className=campoOn?'btn on':'btn';
    drawField();
    document.getElementById('status').textContent=campoOn
      ?'✅ Arraste ⊙ para mover · «‹›» ajustam rotação · ±1m nas dimensões'
      :'📍 Arraste ⊙ ou edite Lat/Lon · botões «‹›» ajustam rotação';
  }

  // ── Geometria do campo ───────────────────────────────────────────────
  function toR(d){ return d*Math.PI/180; }
  function geo(xO,yO){
    var r=toR(rotD);
    var nM=yO*Math.cos(r)-xO*Math.sin(r);
    var eM=yO*Math.sin(r)+xO*Math.cos(r);
    return [cLat+nM/111320, cLon+eM/(111320*Math.cos(toR(cLat)))];
  }
  function lc(pts){ return pts.map(function(p){ return geo(p[0]-fL/2,p[1]-fW/2); }); }
  function pl(pts,opt){
    if(!cl) return;
    L.polyline(lc(pts), Object.assign({interactive:false},opt)).addTo(cl);
  }

  // ── Campo de Futebol (medidas FIFA oficiais) ─────────────────────────
  function drawField(){
    if(!cl) return;
    cl.clearLayers();
    if(!campoOn) return;
    var w  = {color:'white', weight:2,   opacity:.9};
    var wb = {color:'white', weight:3,   opacity:.9};
    var wd = {color:'white', weight:1.5, opacity:.9};
    var gd = {color:'#FFD700', weight:3, opacity:1, interactive:false};
    var i, a, pts, px, px2;

    pl([[0,0],[fL,0],[fL,fW],[0,fW],[0,0]], wb);
    pl([[fL/2,0],[fL/2,fW]], w);

    pl([[0,fW/2-20.16],[16.5,fW/2-20.16],[16.5,fW/2+20.16],[0,fW/2+20.16]], w);
    pl([[fL,fW/2-20.16],[fL-16.5,fW/2-20.16],[fL-16.5,fW/2+20.16],[fL,fW/2+20.16]], w);

    pl([[0,fW/2-9.16],[5.5,fW/2-9.16],[5.5,fW/2+9.16],[0,fW/2+9.16]], w);
    pl([[fL,fW/2-9.16],[fL-5.5,fW/2-9.16],[fL-5.5,fW/2+9.16],[fL,fW/2+9.16]], w);

    pl([[-2.44,fW/2-3.66],[0,fW/2-3.66],[0,fW/2+3.66],[-2.44,fW/2+3.66],[-2.44,fW/2-3.66]], gd);
    pl([[fL+2.44,fW/2-3.66],[fL,fW/2-3.66],[fL,fW/2+3.66],[fL+2.44,fW/2+3.66],[fL+2.44,fW/2-3.66]], gd);

    pts=[];
    for(i=0;i<=60;i++){ a=i/60*2*Math.PI; pts.push([fL/2+9.15*Math.cos(a), fW/2+9.15*Math.sin(a)]); }
    pl(pts, wd);

    pts=[];
    for(i=0;i<=60;i++){ a=-Math.PI+i/60*2*Math.PI; px=11+9.15*Math.cos(a); if(px>16.5) pts.push([px, fW/2+9.15*Math.sin(a)]); }
    if(pts.length>1) pl(pts, wd);

    pts=[];
    for(i=0;i<=60;i++){ a=i/60*2*Math.PI; px2=(fL-11)+9.15*Math.cos(a); if(px2<fL-16.5) pts.push([px2, fW/2+9.15*Math.sin(a)]); }
    if(pts.length>1) pl(pts, wd);

    var corners=[[0,0,0,Math.PI/2],[fL,0,Math.PI/2,Math.PI],[fL,fW,Math.PI,3*Math.PI/2],[0,fW,3*Math.PI/2,2*Math.PI]];
    for(var ci=0;ci<corners.length;ci++){
      var cx2=corners[ci][0], cy2=corners[ci][1], a1=corners[ci][2], a2=corners[ci][3];
      pts=[];
      for(i=0;i<=10;i++){ a=a1+(a2-a1)*i/10; pts.push([cx2+Math.cos(a), cy2+Math.sin(a)]); }
      pl(pts, Object.assign({},w,{weight:1}));
    }

    L.circleMarker(geo(0,0),        {radius:3,color:'white',fillColor:'white',fillOpacity:1,weight:1,interactive:false}).addTo(cl);
    L.circleMarker(geo(11-fL/2, 0), {radius:3,color:'white',fillColor:'white',fillOpacity:1,weight:1,interactive:false}).addTo(cl);
    L.circleMarker(geo(fL/2-11, 0), {radius:3,color:'white',fillColor:'white',fillOpacity:1,weight:1,interactive:false}).addTo(cl);
  }
  </script>
</body>
</html>

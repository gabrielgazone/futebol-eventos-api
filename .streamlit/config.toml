[theme]
base            = "dark"
backgroundColor      = "#0f1117"
secondaryBackgroundColor = "#1a1d27"
textColor       = "#e8eaf0"
primaryColor    = "#4ade80"
font            = "sans serif"

[server]
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
